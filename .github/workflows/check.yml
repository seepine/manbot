name: Check

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check Type
        run: bun run tsc

      - name: Check Formatting
        run: bunx --bun prettier --check src/
