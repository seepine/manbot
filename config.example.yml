# 默认模型提供商
providers:
  my-provider: # 提供商名称
    type: openai # 或 anthropic，默认openai
    base-url:
    api-key:

agents:
  # 第一个 agent
  main:
    workspace-dir: workspace-main # 可选，未配置默认 workspace-<agentName>
    provider:
      name: my-provider
      model: minimax-m2.7
      timeout: 120000 # 可选
      temperature: 0.7 # 可选
      top-p: 0.9 # 可选
    channel:
      type: feishu # 目前只支持飞书
      app-id:
      app-secret:
      app-name:

  # 第二个 agent
  secondary-agent:
    # ...
